<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── SEO ──────────────────────────────────────────────────────────── -->
    <title>DeliverIQ — Smart Food Delivery ETA Estimator</title>
    <meta
      name="description"
      content="DeliverIQ estimates your food delivery arrival time using GPS coordinates, real-world traffic conditions, and preparation time. Fast, accurate, and beautifully simple."
    />
    <meta name="keywords" content="food delivery, ETA estimator, delivery time calculator, restaurant tracker, DeliverIQ, Haversine" />
    <meta name="author" content="DeliverIQ" />
    <meta name="robots" content="index, follow" />

    <!-- ── Open Graph (Social Sharing) ─────────────────────────────────── -->
    <meta property="og:title"       content="DeliverIQ — Smart Food Delivery ETA" />
    <meta property="og:description" content="Estimate your food delivery time with precision using real-world traffic models." />
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="DeliverIQ" />

    <!-- ── Twitter Card ─────────────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="DeliverIQ — Smart ETA Estimator" />
    <meta name="twitter:description" content="Estimate food delivery time using Haversine distance + traffic modelling." />

    <!-- ── Favicon (lightning bolt emoji — works everywhere without an image file) -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>"
    />

    <!-- ── Google Fonts: Inter ───────────────────────────────────────────── -->
    <!-- preconnect hints tell the browser to open the TCP connection early -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- React mounts here -->
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
